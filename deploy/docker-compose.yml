name: static-sites

services:
  nginx:
    image: nginx:1.27.5-alpine@sha256:62223d644fa234c3a1cc785ee14242ec47a77364226f1c811d2f669f96dc2ac8
    container_name: static-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../:/usr/share/nginx/html:ro
      - ./nginx-conf/default.conf:/etc/nginx/conf.d/default.conf:ro
