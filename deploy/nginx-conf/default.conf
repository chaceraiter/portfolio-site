server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Block access to all dotfiles (.git, .env, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block access to non-public repo directories
    location ^~ /deploy/ {
        deny all;
        return 404;
    }
    location ^~ /ai-context-management/ {
        deny all;
        return 404;
    }
    location ^~ /mockups/ {
        deny all;
        return 404;
    }

    # Block access to common sensitive paths
    location ~* ^/(Makefile|README|LICENSE|CHANGELOG|CONTRIBUTING|Dockerfile|docker-compose|Vagrantfile|MAINTENANCE|BACKLOG) {
        deny all;
        return 404;
    }

    # Add security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ =404;
    }
}
